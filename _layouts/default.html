<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body class="{{ page.body_class }}">

  {% unless page.body_class == "map-page" %}
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">{{ site.title }}</h1>
      <p class="site-description">{{ site.description }}</p>

      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/map.html' | relative_url }}">Embedded Map</a>
      </nav>
    </div>
  </header>
  {% endunless %}

  <main class="{% if page.body_class == 'map-page' %}map-page-container{% else %}container content-card{% endif %}">
    {{ content }}
  </main>

  {% unless page.body_class == "map-page" %}
  <footer class="site-footer">
    <div class="container">
      <p>Created for GIS 661 Web GIS 2 - Assignment 7</p>
    </div>
  </footer>
  {% endunless %}

</body>
</html>
